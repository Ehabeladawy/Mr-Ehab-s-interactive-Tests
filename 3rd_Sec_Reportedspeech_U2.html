<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Ehab - 60 Grammar Challenge (7127)</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --primary: #6366f1; --purple-glow: #8b5cf6; --success: #10b981;
    --danger: #ef4444; --bg-dark: #020617; 
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
body { background: var(--bg-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; position: relative; overflow-x: hidden; }

#particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

.main-card { 
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); 
    width: 100%; max-width: 850px; border-radius: 40px; 
    border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(99, 102, 241, 0.2); 
    overflow: hidden; position: relative; z-index: 2; margin: 20px 0;
}

.quiz-header { padding: 20px 40px; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }

.logo-container { 
    width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--danger); 
    overflow: hidden; background: #000; box-shadow: 0 0 15px var(--danger);
    animation: glow-pulse 2s infinite ease-in-out;
}
@keyframes glow-pulse {
    0% { box-shadow: 0 0 5px var(--danger); transform: scale(1); }
    50% { box-shadow: 0 0 25px var(--danger), 0 0 40px rgba(239, 68, 68, 0.4); transform: scale(1.05); }
    100% { box-shadow: 0 0 5px var(--danger); transform: scale(1); }
}
.logo-img { width: 100%; height: 100%; object-fit: cover; }

.header-text { text-align: left; }
.header-text h1 { font-size: 1.6rem; font-weight: 900; color: white; }
.animated-name {
    background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 200% auto; animation: shine 3s linear infinite; font-weight: 900; font-size: 1.1rem;
}
@keyframes shine { to { background-position: 200% center; } }

.progress-section { padding: 15px 40px; background: rgba(0,0,0,0.3); display: none; }
.progress-info { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; color: #94a3b8; }
.progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #d946ef); transition: width 0.5s ease; }

.question-row { 
    background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; 
    margin-bottom: 15px; border: 1px solid var(--danger); 
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
    display: flex; align-items: center; gap: 20px; direction: ltr;
}
.question-text { font-size: 1.3rem; font-weight: 800; text-align: left; flex: 1; color: #f8fafc; line-height: 1.6; }

.correct-answer-feedback {
    background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 15px; border-radius: 15px;
    margin-bottom: 20px; font-weight: 700; font-size: 1.2rem; border: 1px solid var(--success);
    display: none; animation: slideIn 0.3s ease; direction: ltr; text-align: left;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.timer-wrapper { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
.timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
.timer-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
.timer-progress { 
    fill: none; stroke: var(--success); stroke-width: 6; stroke-linecap: round;
    stroke-dasharray: 226; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s;
}
#timer-text { position: absolute; font-size: 1.6rem; font-weight: 900; }

.option-box { 
    background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
    padding: 18px 25px; border-radius: 18px; cursor: pointer; font-weight: 700; font-size: 1.2rem; 
    margin-bottom: 12px; color: white; width: 100%; direction: ltr; transition: 0.3s all;
    display: flex; justify-content: space-between; align-items: center;
}
.option-box:hover { background: rgba(99, 102, 241, 0.15); transform: translateX(10px); }

.correct { background: var(--success) !important; border-color: #fff !important; }
.wrong { background: var(--danger) !important; border-color: #fff !important; }
.disabled { pointer-events: none; }

.btn { 
    background: linear-gradient(135deg, #4f46e5, #9333ea); color: white; padding: 16px 35px; 
    border: none; border-radius: 18px; font-size: 1.2rem; font-weight: 800; cursor: pointer; 
    margin: 10px; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px;
}
.scene { display: none; padding: 40px; text-align: center; }
.active { display: block; animation: zoomIn 0.5s ease; }
@keyframes zoomIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }

input[type="text"] { width: 85%; padding: 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; text-align: center; font-size: 1.3rem; outline: none; margin-bottom: 30px; }
.review-area { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 25px; margin-top: 25px; text-align: center; display: none; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<canvas id="particles-js"></canvas>

<div class="main-card" id="card">
    <div class="quiz-header">
        <div class="logo-container">
            <img src="https://drive.google.com/thumbnail?id=1y4dyG-9kLmoeIaoDev-wFFq5-U8EopB5&sz=w200" class="logo-img">
        </div>
        <div class="header-text">
            <h1>Unit 2: 60 Reported Speech Challenge</h1>
            <span class="animated-name">إعداد وبرمجة / أ. إيهاب العدوي</span>
        </div>
    </div>

    <div class="progress-section" id="progressArea">
        <div class="progress-info">
            <span id="progStep">السؤال 1</span>
            <span id="progPercent">0%</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="pBar"></div>
        </div>
    </div>

    <div id="welcome-scene" class="scene active">
        <img src="https://drive.google.com/thumbnail?id=1cF-j-60otMztzK5ruWOGf02aem5WUG7R&sz=w600" style="width: 250px; margin-bottom: 20px;">
        <h2 style="font-size: 1.8rem; margin-bottom: 20px;">تحدي القواعد الشامل (60 سؤال)</h2>
        <input type="text" id="studentName" placeholder="أدخل اسمك يا بطل">
        <br>
        <button class="btn" onclick="startTest()">ابدأ التحدي <i class="fa-solid fa-bolt"></i></button>
    </div>

    <div id="quiz-scene" class="scene">
        <div id="quiz-content"></div>
    </div>

    <div id="result-scene" class="scene">
        <h2 id="result-title" style="font-size: 2.2rem; margin-bottom: 25px;">النتيجة النهائية</h2>
        <div id="result-container" style="position:relative; width:100%; max-width:600px; margin: 0 auto 30px;"></div>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
            <button class="btn" onclick="toggleReview()" style="background:rgba(255,255,255,0.1)"><i class="fa-solid fa-eye"></i> مراجعة الأخطاء</button>
            <button class="btn" onclick="location.reload()" style="background:rgba(255,255,255,0.05)"><i class="fa-solid fa-rotate"></i> جرب مرة تانية</button>
        </div>
        <div id="reviewArea" class="review-area"></div>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>
const quizData = [
    { q: "He said that he _______ to the club the day before.", options: ["go", "went", "has gone", "had gone"], correct: "had gone" },
    { q: "Omar said that he _______ ill that day.", options: ["is", "was", "has been", "had been"], correct: "was" },
    { q: "Leila said that she _______ tennis and she had played a good game that morning.", options: ["likes", "liked", "is liking", "has liked"], correct: "liked" },
    { q: "She told me that she _______ her homework then.", options: ["is doing", "was doing", "does", "did"], correct: "was doing" },
    { q: "They said they _______ their grandparents the following week.", options: ["visit", "would visit", "had visited", "visited"], correct: "would visit" },
    { q: "My friend said that he _______ a new car recently.", options: ["buys", "had bought", "has bought", "was buying"], correct: "had bought" },
    { q: "The teacher told us that the earth _______ around the sun.", options: ["go", "goes", "went", "had gone"], correct: "goes" },
    { q: "She said that she was busy _______ .", options: ["now", "then", "that day", "today"], correct: "then" },
    { q: "He told me that he _______ for two hours before I arrived.", options: ["has been waiting", "had been waiting", "is waiting", "waits"], correct: "had been waiting" },
    { q: "The boy said that he _______ his keys the previous night.", options: ["loses", "lost", "had lost", "has lost"], correct: "had lost" },
    { q: "She said that she _______ to the party if she had time.", options: ["will come", "would come", "comes", "came"], correct: "would come" },
    { q: "They told us that they _______ for us at the station then.", options: ["are waiting", "were waiting", "wait", "waited"], correct: "were waiting" },
    { q: "My father said that he _______ a lot of work to do that night.", options: ["has", "had", "has had", "had had"], correct: "had" },
    { q: "The girl said that she _______ her friend two days before.", options: ["meets", "met", "had met", "has met"], correct: "had met" },
    { q: "He said that he _______ the film already.", options: ["sees", "has seen", "had seen", "saw"], correct: "had seen" },
    { q: "She told me that she _______ me a call the following morning.", options: ["gives", "will give", "would give", "gave"], correct: "would give" },
    { q: "They said that they _______ in Cairo since 2010.", options: ["live", "are living", "had lived", "have lived"], correct: "had lived" },
    { q: "He said that he _______ the report by the end of the day.", options: ["will finish", "would have finished", "finishes", "finished"], correct: "would have finished" },
    { q: "The doctor told him that he _______ to stay in bed for a week.", options: ["must", "has to", "had to", "would"], correct: "had to" },
    { q: "I asked him where he _______ the previous summer.", options: ["goes", "has gone", "had gone", "will go"], correct: "had gone" },
    { q: "He asked me _______ I was coming to the party.", options: ["if", "that", "weather", "what"], correct: "if" },
    { q: "The police asked the man what he _______ at 8 PM the night before.", options: ["did", "was doing", "had been doing", "has done"], correct: "had been doing" },
    { q: "She promised that she _______ me as soon as she arrived.", options: ["calls", "will call", "would call", "called"], correct: "would call" },
    { q: "He said, 'I'm tired'. -> He said that he _______ tired.", options: ["is", "was", "has been", "had been"], correct: "was" },
    { q: "They told us that they _______ to London twice before.", options: ["went", "have been", "had been", "were going"], correct: "had been" },
    { q: "The student admitted that he _______ the mistake.", options: ["makes", "had made", "has made", "was making"], correct: "had made" },
    { q: "She explained that the water _______ at 100 degrees Celsius.", options: ["boils", "boiled", "had boiled", "is boiling"], correct: "boils" },
    { q: "He said that he _______ his car the week before.", options: ["sells", "sold", "had sold", "has sold"], correct: "had sold" },
    { q: "I wanted to know why she _______ so angry with me.", options: ["is", "was", "has been", "had been"], correct: "was" },
    { q: "The manager said that the meeting _______ the next day.", options: ["is", "will be", "would be", "was"], correct: "would be" },
    { q: "He said, 'I have already seen this movie'. -> He said he _______ that movie.", options: ["has already seen", "had already seen", "already saw", "already sees"], correct: "had already seen" },
    { q: "She asked me _______ I liked horror movies.", options: ["if", "what", "that", "which"], correct: "if" },
    { q: "They said they _______ for us for over an hour.", options: ["wait", "are waiting", "had been waiting", "have waited"], correct: "had been waiting" },
    { q: "He said he _______ help me with my project.", options: ["can", "could", "may", "will"], correct: "could" },
    { q: "She said, 'I'll be there'. -> She said that she _______ be there.", options: ["will", "would", "is", "was"], correct: "would" },
    { q: "The guide told the tourists that the museum _______ at 9 AM.", options: ["opens", "opened", "had opened", "was opening"], correct: "opens" },
    { q: "He said that he _______ his homework then.", options: ["does", "is doing", "was doing", "did"], correct: "was doing" },
    { q: "She said she _______ to the zoo the previous Friday.", options: ["goes", "went", "had gone", "has gone"], correct: "had gone" },
    { q: "He told me that he _______ to France the following summer.", options: ["is traveling", "travels", "would travel", "traveled"], correct: "would travel" },
    { q: "They said they _______ late because of the traffic.", options: ["are", "were", "have been", "had been"], correct: "were" },
    { q: "She asked if I _______ the book yet.", options: ["read", "have read", "had read", "was reading"], correct: "had read" },
    { q: "He said he _______ his keys somewhere.", options: ["loses", "lost", "had lost", "has lost"], correct: "had lost" },
    { q: "I told them that I _______ finish the work by tomorrow.", options: ["can", "will", "would", "must"], correct: "would" },
    { q: "She said, 'I may be late'. -> She said she _______ be late.", options: ["may", "might", "can", "must"], correct: "might" },
    { q: "The coach said that we _______ win the match.", options: ["can", "could", "will", "would"], correct: "could" },
    { q: "He said that he _______ the report the day before.", options: ["finishes", "finished", "had finished", "has finished"], correct: "had finished" },
    { q: "She wondered _______ he would arrive on time.", options: ["if", "that", "what", "which"], correct: "if" },
    { q: "They said they _______ to the cinema that night.", options: ["go", "are going", "were going", "went"], correct: "were going" },
    { q: "He said, 'I must leave'. -> He said he _______ leave.", options: ["must", "had to", "might", "could"], correct: "had to" },
    { q: "She told us that the sun _______ in the east.", options: ["rises", "rose", "had risen", "was rising"], correct: "rises" },
    { q: "He said that he _______ for a long time.", options: ["waits", "was waiting", "had been waiting", "is waiting"], correct: "had been waiting" },
    { q: "They said they _______ a new house soon.", options: ["buy", "will buy", "would buy", "bought"], correct: "would buy" },
    { q: "She said, 'I am writing a letter'. -> She said she _______ a letter.", options: ["is writing", "was writing", "had written", "wrote"], correct: "was writing" },
    { q: "He asked me _______ I had seen his phone.", options: ["if", "that", "what", "where"], correct: "if" },
    { q: "She said that she _______ me the truth.", options: ["tells", "told", "had told", "has told"], correct: "had told" },
    { q: "They said they _______ playing football then.", options: ["are", "were", "had been", "will be"], correct: "were" },
    { q: "He said, 'I don't like coffee'. -> He said he _______ coffee.", options: ["doesn't like", "didn't like", "hasn't liked", "won't like"], correct: "didn't like" },
    { q: "She told me she _______ to the bank earlier.", options: ["goes", "went", "had gone", "is going"], correct: "had gone" },
    { q: "The teacher said that we _______ hard.", options: ["study", "should study", "had studied", "studied"], correct: "should study" },
    { q: "He said that he _______ his lunch already.", options: ["eats", "ate", "had eaten", "has eaten"], correct: "had eaten" }
];

let shuffled = [], currentIdx = 0, score = 0, name = "", timer, timeLeft = 60, wrongs = [];

function startTest() {
    name = document.getElementById('studentName').value.trim();
    if(!name) name = "بطل مجهول"; // قبول أي اسم
    shuffled = quizData.sort(() => Math.random() - 0.5);
    document.getElementById('progressArea').style.display = "block";
    showScene('quiz-scene');
    loadQuestion();
}

function loadQuestion() {
    clearInterval(timer);
    timeLeft = 60;
    const q = shuffled[currentIdx];
    const p = (currentIdx / shuffled.length) * 100;
    document.getElementById('pBar').style.width = p + "%";
    document.getElementById('progStep').innerText = `سؤال ${currentIdx + 1} من ${shuffled.length}`;
    document.getElementById('progPercent').innerText = Math.round(p) + "%";

    document.getElementById('quiz-scene').innerHTML = `
        <div class="question-row">
            <div class="question-text">${q.q}</div>
            <div class="timer-wrapper">
                <svg class="timer-svg" viewBox="0 0 80 80">
                    <circle class="timer-bg" cx="40" cy="40" r="36"></circle>
                    <circle id="timerRing" class="timer-progress" cx="40" cy="40" r="36"></circle>
                </svg>
                <div id="timer-text">60</div>
            </div>
        </div>
        <div id="feedback" class="correct-answer-feedback"></div>
        <div id="optionsGrid"></div>
    `;

    let currentOptions = [...q.options].sort(() => Math.random() - 0.5);
    currentOptions.forEach((optText) => {
        const div = document.createElement('div');
        div.className = "option-box";
        div.innerHTML = `<span>${optText}</span>`;
        div.onclick = () => check(div, optText === q.correct);
        document.getElementById('optionsGrid').appendChild(div);
    });
    startTimer();
}

function startTimer() {
    const tText = document.getElementById('timer-text');
    const ring = document.getElementById('timerRing');
    timer = setInterval(() => {
        timeLeft--;
        tText.innerText = timeLeft;
        let offset = 226 - (timeLeft * (226 / 60));
        ring.style.strokeDashoffset = offset;
        if(timeLeft <= 0) { clearInterval(timer); check(null, false); }
    }, 1000);
}

function check(el, isCorrect) {
    clearInterval(timer);
    const q = shuffled[currentIdx];
    const feedback = document.getElementById('feedback');
    document.querySelectorAll('.option-box').forEach(b => b.classList.add('disabled'));

    if (isCorrect) {
        if(el) el.classList.add('correct');
        document.getElementById('sound-correct').play();
        score++;
        setTimeout(next, 1200);
    } else {
        if(el) el.classList.add('wrong');
        document.getElementById('sound-wrong').play();
        wrongs.push({q: q.q, a: q.correct});
        feedback.innerHTML = `<i class="fa-solid fa-lightbulb"></i> الإجابة الصحيحة هي: <strong>${q.correct}</strong>`;
        feedback.style.display = "block";
        highlightCorrect(q.correct);
        setTimeout(next, 3000); 
    }
}

function highlightCorrect(correctText) {
    document.querySelectorAll('.option-box').forEach(b => {
        if(b.innerText.trim() === correctText) {
            b.style.borderColor = "var(--success)";
            b.style.boxShadow = "0 0 20px var(--success)";
            b.querySelector('span').style.color = "var(--success)";
        }
    });
}

function next() {
    currentIdx++;
    if(currentIdx < shuffled.length) loadQuestion(); else finish();
}

function finish() {
    document.getElementById('progressArea').style.display = "none";
    showScene('result-scene');
    const percentage = (score / shuffled.length) * 100;
    const resContainer = document.getElementById('result-container');
    const rev = document.getElementById('reviewArea');

    if (percentage >= 50) {
        confetti({ particleCount: 150, spread: 60 });
        resContainer.innerHTML = `<div style="padding:40px; background:rgba(16, 185, 129, 0.1); border:2px solid var(--success); border-radius:30px;"><h2>مبروك يا ${name}!</h2><p>درجتك: ${score} من ${shuffled.length}</p></div>`;
    } else {
        resContainer.innerHTML = `<div style="padding:40px; background:rgba(239, 68, 68, 0.1); border:2px solid var(--danger); border-radius:30px;"><h2>حاول مرة أخرى يا ${name}!</h2><p>درجتك: ${score} من ${shuffled.length}</p></div>`;
    }

    if (wrongs.length > 0) {
        rev.innerHTML = "<h3>مراجعة الأخطاء:</h3>";
        wrongs.forEach(w => rev.innerHTML += `<div style="margin:10px 0; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; text-align:left; direction:ltr;">Q: ${w.q}<br><span style="color:var(--success)">Ans: ${w.a}</span></div>`);
    }
}

function toggleReview() {
    const r = document.getElementById('reviewArea');
    r.style.display = (r.style.display === "none" || r.style.display === "") ? "block" : "none";
}

function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

const canvas = document.getElementById('particles-js');
const ctx = canvas.getContext('2d');
let pts = [];
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
class P {
    constructor() { this.reset(); }
    reset() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*2+1; this.vx=(Math.random()-0.5)*0.5; this.vy=(Math.random()-0.5)*0.5; }
    update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset(); }
    draw() { ctx.fillStyle="rgba(139,92,246,0.3)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
}
for(let i=0;i<50;i++) pts.push(new P());
function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
animate();
</script>
</body>
</html>
