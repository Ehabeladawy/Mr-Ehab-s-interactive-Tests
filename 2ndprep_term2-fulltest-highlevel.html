<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mr. Ehab - Exam 5</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --primary: #6366f1; --accent: #ef4444; --success: #10b981; 
            --danger: #ef4444; --bg-dark: #020617; --gold: #ffb142;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; position: relative; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .main-card { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); 
            width: 100%; max-width: 1000px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); 
            overflow: hidden; position: relative; z-index: 2; margin: 20px 0;
        }
        .quiz-header { padding: 25px 40px; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--danger); flex-wrap: wrap; gap: 15px; }
        .logo-container { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--danger); overflow: hidden; background: #000; box-shadow: 0 0 15px var(--danger); }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { text-align: left; }
        .animated-name { background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 1.2rem; }
        .section-divider { margin: 50px 0 30px 0; display: flex; align-items: center; justify-content: center; }
        .divider-line { height: 2px; flex-grow: 1; background: linear-gradient(90deg, transparent, var(--danger), transparent); }
        .divider-badge { display: flex; align-items: center; gap: 15px; background: rgba(239, 68, 68, 0.15); padding: 10px 30px; border-radius: 50px; border: 1px solid var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); color: white; font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .divider-logo { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); }
        
        .question-row { 
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px; 
            margin-bottom: 25px; border: 2px solid transparent;
            transition: 0.4s ease-in-out; direction: ltr; 
        }
        .question-row.has-selection { border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .question-text { font-size: 1.15rem; font-weight: 700; color: #f8fafc; margin-bottom: 15px; display: block; text-align: left; line-height: 1.6; }
        
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; direction: ltr; }
        .option-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        
        .correct-ans { background: rgba(16, 185, 129, 0.3) !important; border-color: var(--success) !important; }
        .wrong-ans { background: rgba(239, 68, 68, 0.3) !important; border-color: var(--danger) !important; }
        .feedback-msg { margin-top: 12px; font-weight: bold; font-size: 0.95rem; text-align: left; }
        .feedback-correct { color: var(--success); }
        .feedback-wrong { color: var(--danger); }

        .selected-option { border-color: var(--danger) !important; background: rgba(239, 68, 68, 0.3) !important; }
        .passage-box { background: #0f172a; padding: 25px; border-radius: 25px; border-right: 5px solid transparent; line-height: 1.8; text-align: left; direction: ltr; margin-bottom: 30px; font-size: 1.1rem; }

        /* Dialogue Styles */
        .dialogue-container { background: #0f172a; padding: 25px; border-radius: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); direction: ltr; text-align: left; }
        .msg { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; display: inline-block; max-width: 80%; line-height: 1.4; }
        .ali { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; border-left: 4px solid var(--primary); }
        .sara { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border-left: 4px solid var(--danger); margin-left: 20%; }

        .drop-zone {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 130px; height: 35px; background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(239, 68, 68, 0.4); border-radius: 10px;
            margin: 0 5px; vertical-align: middle; transition: 0.3s;
        }
        .drop-input {
            width: 100%; background: transparent; border: none; color: var(--gold);
            text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; padding: 0 5px;
        }

        .btn { background: linear-gradient(135deg, #ef4444, #991b1b); color: white; padding: 16px 40px; border: none; border-radius: 18px; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .submit-btn { background: linear-gradient(135deg, #10b981, #059669); width: 80%; margin: 30px auto; display: block; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .scene { display: none; padding: 40px; text-align: center; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        input[type="text"].main-input { width: 80%; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--danger); color: white; text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        .score-badge { font-size: 1.8rem; margin: 20px 0; color: var(--gold); font-weight: 900; }
        .drag-area { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; direction: ltr; }
        .drag-word { display: inline-block; background: var(--danger); padding: 8px 18px; margin: 5px; border-radius: 40px; cursor: grab; transition: 0.2s; font-weight: bold; }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div class="main-card">
    <div class="quiz-header">
        <div class="logo-container"><img src="https://drive.google.com/thumbnail?id=1y4dyG-9kLmoeIaoDev-wFFq5-U8EopB5&sz=w200" class="logo-img"></div>
        <div class="header-text"><h1 style="color:white">Exam (High Level -Hello plus) - Prep 2 Second Term</h1><span class="animated-name">Designed by / Mr. Ehab Eladawy</span></div>
    </div>
    
    <div id="welcome-scene" class="scene active">
        <img src="https://drive.google.com/thumbnail?id=1cF-j-60otMztzK5ruWOGf02aem5WUG7R&sz=w600" style="width:200px; margin-bottom:20px;">
        <h2 style="color:var(--gold); margin-bottom:20px;">English Final Revision - Test 5</h2>
        <input type="text" id="studentName" class="main-input" placeholder="Enter Your Full Name">
        <br><button class="btn" onclick="startExam()">Start Exam 🚀</button>
    </div>

    <div id="quiz-scene" class="scene">
        <div id="quiz-content"></div>
        <button class="btn submit-btn" onclick="finishExam()">تسليم الاختبار 📌</button>
    </div>

    <div id="result-scene" class="scene">
        <div id="result-container"></div>
        <div id="scoreDisplay" class="score-badge"></div>
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn" style="background: #6366f1;" onclick="reviewFullExam()">مراجعة الاختبار 🔍</button>
            <button class="btn" onclick="location.reload()">إعادة الاختبار 🔄</button>
        </div>
        <div id="review-content" style="margin-top: 40px;"></div>
    </div>
</div>

<script>
const myLogo = "https://drive.google.com/thumbnail?id=1y4dyG-9kLmoeIaoDev-wFFq5-U8EopB5&sz=w200";
let studentAnswers = {};
let dragDropAnswers = {0: "", 1: "", 2: "", 3: "", 4: ""};

const shuffledOptionsCache = {};

function shuffle(array) {
    let curr = array.length, rand;
    while (curr != 0) {
        rand = Math.floor(Math.random() * curr);
        curr--;
        [array[curr], array[rand]] = [array[rand], array[curr]];
    }
    return array;
}

// =============================================
// 1. VOCABULARY (6 questions)
// =============================================
const vocabQs = [
    { q: "We should ............ plastic bottles to help the planet.", options: ["damage", "recycle", "pollute", "burn"], correct: "recycle" },
    { q: "............ food is grown without harmful chemicals.", options: ["Organic", "Atomic", "Plastic", "Electric"], correct: "Organic" },
    { q: "The new ............ on the roof will generate electricity from the sun.", options: ["sensors", "solar panels", "radars", "scanners"], correct: "solar panels" },
    { q: "The play was fantastic. The ............ clapped loudly at the end.", options: ["poem", "audience", "title", "verse"], correct: "audience" },
    { q: "Limiting harmful substances in manufacturing helps reduce ............", options: ["pollution", "pace", "verses", "aims"], correct: "pollution" },
    { q: "Things connected with the ocean are described as ............", options: ["historical", "marine", "industrial", "electrical"], correct: "marine" }
];

// =============================================
// 2. READ AND COMPLETE — drag/drop words
// =============================================
const dragWords = ["poet", "musical", "rhyme", "inspire", "title", "verse"];
const dragCorrectOrder = ["poet", "title", "inspire", "rhyme", "musical"];

// =============================================
// 3. READING COMPREHENSION
// =============================================
const readingPassage = `Fast fashion means making clothes very quickly and selling them at low prices. Many people like fast fashion because it is cheap and follows new trends. However, it causes many serious problems. Making these clothes uses a lot of water and chemicals which pollute rivers and the air. In addition, people often buy many clothes and wear them only a few times before throwing them away. This creates large amounts of waste that usually end up in landfill sites or are burned. Another problem is that workers in some clothing factories are paid very little and work in unsafe conditions. To reduce these problems, people should buy fewer clothes, choose better-quality items, and recycle or reuse old clothes.`;

const readingQs = [
    { q: "The text is mainly about '............'.", options: ["Snorkeling trips", "Desertification", "The problems of fast fashion", "National parks"], correct: "The problems of fast fashion" },
    { q: "............ used in fast fashion, pollute rivers and the air.", options: ["Trends", "Water", "Chemicals", "Crops"], correct: "Chemicals" },
    { q: "What does fast fashion mean?", options: ["Making quality clothes that last for years", "Making clothes quickly and selling them cheaply", "Recycling old clothes into new ones", "Buying expensive clothes that follow trends"], correct: "Making clothes quickly and selling them cheaply" },
    { q: "Why do many people like fast fashion?", options: ["Because it is eco-friendly", "Because it is cheap and follows new trends", "Because workers are paid well", "Because it uses clean water only"], correct: "Because it is cheap and follows new trends" },
    { q: "What is one environmental problem caused by fast fashion?", options: ["It saves a lot of clean water", "It creates large amounts of waste in landfills", "It improves air quality", "It reduces the use of chemicals"], correct: "It creates large amounts of waste in landfills" },
    { q: "What should people do to help solve the problems of fast fashion?", options: ["Buy more clothes every season", "Wear clothes once and throw them away", "Buy fewer clothes, choose better quality, and recycle old ones", "Support factories that pay workers less"], correct: "Buy fewer clothes, choose better quality, and recycle old ones" }
];

// =============================================
// 4. GRAMMAR (choose correct answer)
// =============================================
const grammarQs = [
    { q: "Many beautiful poems ............ by a famous poet last century.", options: ["are written", "were written", "have written", "wrote"], correct: "were written" },
    { q: "You enjoyed the book, ............ you?", options: ["didn't", "aren't", "haven't", "don't"], correct: "didn't" },
    { q: "We need to ............ this old furniture in a responsible way.", options: ["get rid of", "take part in", "fed up with", "make for"], correct: "get rid of" },
    { q: "If I see a turtle on the beach, I ............ take a picture from far away.", options: ["was", "would", "am", "will"], correct: "will" },
    { q: "By next month, they ............ all the paving stones for the new park.", options: ["will deliver", "deliver", "will have delivered", "are delivering"], correct: "will have delivered" },
    { q: "The poems of Robert Louis Stevenson have ............ in school for many years.", options: ["study", "been studied", "studied", "studying"], correct: "been studied" }
];

// =============================================
// 5. CORRECT FORM (rewrite as MCQ)
// =============================================
const correctFormQs = [
    { q: "Last week, a prize for literature was ............ (award) to a young writer.", options: ["award", "awarded", "awarding", "awards"], correct: "awarded" },
    { q: "If we don't stop pollution, the climate ............ (get) warmer.", options: ["got", "gets", "will get", "getting"], correct: "will get" },
    { q: "By 2040, most cars ............ (become) electric.", options: ["become", "became", "will have become", "are becoming"], correct: "will have become" },
    { q: "The new play ............ (perform) for the first time next Friday.", options: ["performed", "performs", "will be performed", "is performing"], correct: "will be performed" },
    { q: "You enjoyed snorkeling in the Red Sea, ............ (do) you?", options: ["do", "did", "didn't", "aren't"], correct: "didn't" }
];

// =============================================
// 6. DIALOGUE
// =============================================
const dialogueQs = [
    { q: "Sara: (1) ............", options: ["My project is about pollution and its dangers.", "I didn't do any project.", "My project is about cooking food.", "I want to talk about animals."], correct: "My project is about pollution and its dangers." },
    { q: "Ali: That's a big problem. (2) ............?", options: ["Where do you live?", "How can we solve it?", "Do you like shopping?", "When is the holiday?"], correct: "How can we solve it?" },
    { q: "Ali: (3) ............?", options: ["Where is the school?", "When will you present it?", "Do you like music?", "Who is your teacher?"], correct: "When will you present it?" },
    { q: "Ali: (4) ............?", options: ["Yes, I finished it last week.", "No, I haven't finished it yet.", "I don't have a project.", "I submitted it yesterday."], correct: "No, I haven't finished it yet." },
    { q: "Sara: (5) ............", options: ["Go to sleep early.", "Make a clear plan and work on it step by step.", "Watch TV and relax.", "Ask someone else to do it."], correct: "Make a clear plan and work on it step by step." }
];

// =============================================
// 7. THE NOVEL (Little Women)
// =============================================
const storyQs = [
    { q: "The March sisters did not receive presents at the beginning of the story because ............", options: ["they forgot the holiday", "their mother was ill", "their father was away at war", "they did not want gifts"], correct: "their father was away at war" },
    { q: "............ says she is happy because they have each other.", options: ["Meg", "Jo", "Amy", "Beth"], correct: "Beth" },
    { q: "Mr. March was in ............ during the war.", options: ["Europe", "New York", "Washington", "Boston"], correct: "Washington" },
    { q: "............ suggested buying presents for their mother instead of themselves.", options: ["Meg", "Jo", "Amy", "Beth"], correct: "Beth" },
    { q: "How did the March sisters feel about being poor at the beginning of the story?", options: ["They were happy and grateful", "They complained and felt it was unfair", "They ignored it and had fun", "They were proud of being poor"], correct: "They complained and felt it was unfair" },
    { q: "What does Beth's behavior show about her character?", options: ["She is selfish and greedy", "She is kind, gentle, and caring", "She is lazy and careless", "She is competitive and ambitious"], correct: "She is kind, gentle, and caring" },
    { q: "What is the importance of the letter from Mr. March?", options: ["It brought money for the family", "It gave hope and connected the family to their father", "It told them the war had ended", "It asked them to move to another city"], correct: "It gave hope and connected the family to their father" },
    { q: "How does the setting of wartime affect the family's life?", options: ["It makes them richer", "It has no effect on them", "It causes poverty and the absence of their father", "It brings them closer to their neighbors"], correct: "It causes poverty and the absence of their father" }
];

function getShuffledOptions(key, options) {
    if (!shuffledOptionsCache[key]) {
        shuffledOptionsCache[key] = shuffle([...options]);
    }
    return shuffledOptionsCache[key];
}

function genQ(i, prefix, q, isReview = false) {
    const key = `${prefix}_${i}`;
    const userAns = studentAnswers[key];
    const isCorrect = userAns === q.correct;
    
    let currentOptions = isReview ? [...q.options] : getShuffledOptions(key, q.options);

    let optionsHtml = currentOptions.map(opt => {
        let cls = "option-box";
        if (!isReview && userAns === opt) cls += " selected-option";
        if (isReview) {
            if (opt === q.correct) cls += " correct-ans";
            else if (opt === userAns && userAns !== q.correct) cls += " wrong-ans";
        }
        return `<div class="${cls}" ${!isReview ? `onclick="selAns('${key}', '${opt.replace(/'/g, "\\'")}', this)"` : ''}><i class="fa-regular ${opt === userAns ? 'fa-circle-dot' : 'fa-circle'}"></i> ${opt}</div>`;
    }).join('');

    let feedback = "";
    if(isReview) {
        feedback = isCorrect ? 
            `<div class="feedback-msg feedback-correct">✅ Correct Answer</div>` : 
            `<div class="feedback-msg feedback-wrong">❌ Incorrect - Correct is: ${q.correct}</div>`;
    }

    return `<div class="question-row ${userAns ? 'has-selection' : ''}" id="row_${key}">
        <span class="question-text">${q.q}</span>
        <div class="options-grid">${optionsHtml}</div>
        ${feedback}
    </div>`;
}

function selAns(key, val, el) {
    studentAnswers[key] = val;
    el.parentElement.parentElement.classList.add('has-selection');
    el.parentElement.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected-option'));
    el.classList.add('selected-option');
}

function startExam() {
    if(document.getElementById('studentName').value.length < 3) return alert("Please enter your name!");
    document.getElementById('welcome-scene').classList.remove('active');
    document.getElementById('quiz-scene').classList.add('active');
    renderExam();
}

function renderExam(targetId = 'quiz-content', isReview = false) {
    let html = "";
    const section = (title) => `<div class="section-divider"><div class="divider-line"></div><div class="divider-badge"><img src="${myLogo}" class="divider-logo"><span>${title}</span><img src="${myLogo}" class="divider-logo"></div><div class="divider-line"></div></div>`;
    
    // 1. VOCABULARY
    html += section("1. VOCABULARY");
    vocabQs.forEach((q, i) => html += genQ(i, 'v', q, isReview));

    // 2. READ AND COMPLETE (Jane loves poetry text)
    html += section("2. READ AND COMPLETE");
    if(!isReview) {
        const sw = shuffle([...dragWords]);
        html += `<div class="drag-area"><div>${sw.map(w => `<span class="drag-word" draggable="true" ondragstart="event.dataTransfer.setData('text', '${w}')">${w}</span>`).join('')}</div>
        <div style="margin-top:20px; text-align:left; background:rgba(0,0,0,0.3); padding:25px; border-radius:25px; line-height:2.5; direction:ltr;">
            Jane loves poetry. She always reads different kinds of poems at home and at school. Her favorite (1) 
            <span class="drop-zone"><input type="text" class="drop-input" placeholder="..." oninput="dragDropAnswers[0]=this.value"></span> 
            is called Maya, who writes poems about nature and animals. The (2) 
            <span class="drop-zone"><input type="text" class="drop-input" placeholder="..." oninput="dragDropAnswers[1]=this.value"></span> 
            of her best poem is "The Quiet Valley," which describes a peaceful green place. The poetry she likes best uses gentle words to (3) 
            <span class="drop-zone"><input type="text" class="drop-input" placeholder="..." oninput="dragDropAnswers[2]=this.value"></span> 
            people to take care of the environment. The poem also has a lovely (4) 
            <span class="drop-zone"><input type="text" class="drop-input" placeholder="..." oninput="dragDropAnswers[3]=this.value"></span> 
            at the end of each line, making it sound (5) 
            <span class="drop-zone"><input type="text" class="drop-input" placeholder="..." oninput="dragDropAnswers[4]=this.value"></span> 
            and pleasant.
        </div></div>`;
    } else {
        html += `<div class="question-row" style="direction:ltr; text-align:left;">
            <p style="margin-bottom:10px; color:#94a3b8; font-size:0.9rem;">Words: poet - musical - rhyme - inspire - title - verse</p>
            <p style="margin-bottom:8px;">1. ${dragDropAnswers[0].toLowerCase().trim() === dragCorrectOrder[0] ? '✅' : '❌'} Your answer: <b>${dragDropAnswers[0] || 'None'}</b> | Correct: <span style="color:var(--success)">${dragCorrectOrder[0]}</span></p>
            <p style="margin-bottom:8px;">2. ${dragDropAnswers[1].toLowerCase().trim() === dragCorrectOrder[1] ? '✅' : '❌'} Your answer: <b>${dragDropAnswers[1] || 'None'}</b> | Correct: <span style="color:var(--success)">${dragCorrectOrder[1]}</span></p>
            <p style="margin-bottom:8px;">3. ${dragDropAnswers[2].toLowerCase().trim() === dragCorrectOrder[2] ? '✅' : '❌'} Your answer: <b>${dragDropAnswers[2] || 'None'}</b> | Correct: <span style="color:var(--success)">${dragCorrectOrder[2]}</span></p>
            <p style="margin-bottom:8px;">4. ${dragDropAnswers[3].toLowerCase().trim() === dragCorrectOrder[3] ? '✅' : '❌'} Your answer: <b>${dragDropAnswers[3] || 'None'}</b> | Correct: <span style="color:var(--success)">${dragCorrectOrder[3]}</span></p>
            <p style="margin-bottom:8px;">5. ${dragDropAnswers[4].toLowerCase().trim() === dragCorrectOrder[4] ? '✅' : '❌'} Your answer: <b>${dragDropAnswers[4] || 'None'}</b> | Correct: <span style="color:var(--success)">${dragCorrectOrder[4]}</span></p>
        </div>`;
    }

    // 3. READING COMPREHENSION (Fast Fashion)
    html += section("3. READING COMPREHENSION");
    html += `<div class="passage-box">${readingPassage}</div>`;
    readingQs.forEach((q, i) => html += genQ(i, 'r', q, isReview));

    // 4. GRAMMAR
    html += section("4. GRAMMAR");
    grammarQs.forEach((q, i) => html += genQ(i, 'g', q, isReview));

    // 5. CORRECT FORM
    html += section("5. CORRECT THE FORM");
    correctFormQs.forEach((q, i) => html += genQ(i, 'cf', q, isReview));

    // 6. DIALOGUE (Ali and Sara)
    html += section("6. DIALOGUE");
    html += `<div class="dialogue-container">
        <div class="msg ali" style="display:block"><b>Ali:</b> What is your project about, Sara?</div>
        <div class="msg sara" style="display:block"><b>Sara:</b> (1) ............</div>
        <div class="msg ali" style="display:block"><b>Ali:</b> That's a big problem. (2) ............?</div>
        <div class="msg sara" style="display:block"><b>Sara:</b> We can use renewable energy like wind or solar power.</div>
        <div class="msg ali" style="display:block"><b>Ali:</b> (3) ............?</div>
        <div class="msg sara" style="display:block"><b>Sara:</b> I will present it next Monday. Did you finish your project?</div>
        <div class="msg ali" style="display:block"><b>Ali:</b> (4) ............? What should I do to avoid this delay?</div>
        <div class="msg sara" style="display:block"><b>Sara:</b> (5) ............</div>
    </div>`;
    dialogueQs.forEach((q, i) => html += genQ(i, 'd', q, isReview));

    // 7. THE NOVEL (Little Women)
    html += section("7. THE NOVEL - Little Women");
    storyQs.forEach((q, i) => html += genQ(i, 'st', q, isReview));

    document.getElementById(targetId).innerHTML = html;
}

function finishExam() {
    let score = 0;
    const total = vocabQs.length + 5 + readingQs.length + grammarQs.length + correctFormQs.length + dialogueQs.length + storyQs.length;

    vocabQs.forEach((q, i) => { if(studentAnswers[`v_${i}`] === q.correct) score++; });
    for(let i=0;i<5;i++) { if(dragDropAnswers[i].toLowerCase().trim() === dragCorrectOrder[i]) score++; }
    readingQs.forEach((q, i) => { if(studentAnswers[`r_${i}`] === q.correct) score++; });
    grammarQs.forEach((q, i) => { if(studentAnswers[`g_${i}`] === q.correct) score++; });
    correctFormQs.forEach((q, i) => { if(studentAnswers[`cf_${i}`] === q.correct) score++; });
    dialogueQs.forEach((q, i) => { if(studentAnswers[`d_${i}`] === q.correct) score++; });
    storyQs.forEach((q, i) => { if(studentAnswers[`st_${i}`] === q.correct) score++; });

    document.getElementById('quiz-scene').classList.remove('active');
    document.getElementById('result-scene').classList.add('active');
    document.getElementById('scoreDisplay').innerHTML = `Your Score: ${score} / ${total}`;
    if(score >= Math.floor(total/2)) canvasConfetti({ particleCount: 150, spread: 70 });
}

function reviewFullExam() {
    renderExam('review-content', true);
    document.getElementById('review-content').scrollIntoView({ behavior: 'smooth' });
}

particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#ef4444" }, "move": { "speed": 1.5 } } });
</script>
