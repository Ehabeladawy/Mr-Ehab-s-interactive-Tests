<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March English Exam - Mr. Ehab Eladawy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --p: #6366f1; --s: #10b981; --d: #ef4444; --bg: #020617; --g: #ffb142; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; position: relative; overflow-x: hidden; }
#particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
.container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px; width: 100%; max-width: 850px; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.scene { display: none; animation: fadeIn 0.4s ease; }
.scene.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
.rules-list { text-align: right; margin: 20px 0; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid var(--p); }
.rules-list li { margin-bottom: 12px; line-height: 1.6; font-size: 0.95rem; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
.total-timer { font-size: 1.5rem; font-weight: 900; color: var(--g); background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; }
.q-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--p); }
.q-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: white; direction: ltr; text-align: left; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; direction: ltr; }
.opt { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: left; }
.opt.selected { border-color: var(--s); background: rgba(16, 185, 129, 0.1); }
.nav-controls { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; margin-top: 20px; }
.nav-btn { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; font-size: 0.85rem; }
.btn-prev { background: #475569; }
.btn-next { background: var(--p); }
.btn-extra { background: rgba(255, 177, 66, 0.1); border: 1px solid var(--g); color: var(--g); }
.submit-btn { width: 100%; margin-top: 20px; padding: 16px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--s), #059669); color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer; display: none; }
.passage-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--p); font-size: 0.95rem; line-height: 1.6; direction: ltr; text-align: left; }
.drag-container { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; direction: ltr; text-align: left; line-height: 3; }
.drop-zone { display: inline-block; min-width: 90px; height: 32px; border-bottom: 2px solid var(--g); vertical-align: middle; text-align: center; color: var(--s); font-weight: bold; background: rgba(255,255,255,0.05); border-radius: 4px 4px 0 0; }
.word-bank { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px dashed var(--p); }
.word { background: var(--p); padding: 6px 15px; border-radius: 6px; cursor: grab; font-weight: bold; }
input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; margin-bottom: 20px; text-align: center; font-size: 1.1rem; }
.class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.class-btn { padding: 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; text-align: center; font-weight: bold; }
.class-btn.selected { border-color: var(--s); background: rgba(16, 185, 129, 0.2); }
</style>
</head>
<body oncontextmenu="return false;">
<canvas id="particles-js"></canvas>

<div class="container" id="main-box">
    <div id="rules-scene" class="scene active">
        <h2 style="text-align:center; color:var(--g);"><i class="fas fa-file-signature"></i> March English Exam</h2>
        <div class="rules-list">
            <ul>
                <li><i class="fas fa-lock" style="color:var(--d)"></i> زر التسليم لن يظهر إلا بعد إنهاء الـ 30 سؤالاً.</li>
                <li><i class="fas fa-undo" style="color:var(--p)"></i> الأسئلة المتروكة سيتم ترحيلها آلياً للنهاية.</li>
                <li><i class="fas fa-graduation-cap" style="color:var(--s)"></i> سيتم تسجيل نتيجتك ومحاولات الخروج في جدول البيانات فوراً.</li>
            </ul>
        </div>
        <button class="nav-btn btn-next" style="width:100%; padding:18px;" onclick="showScene('login-scene')">بدء الاختبار <i class="fas fa-arrow-left"></i></button>
    </div>

    <div id="login-scene" class="scene">
        <h2 style="text-align:center; color:var(--p); margin-bottom:10px;">بيانات الطالب</h2>
        <input type="text" id="studentName" placeholder="الاسم الرباعي للطالب..." autocomplete="off">
        <div class="class-grid">
            <div class="class-btn" onclick="selectClass(this, 'ثالث أول عربي')">ثالث أول عربي</div>
            <div class="class-btn" onclick="selectClass(this, 'ثالث ثاني لغات')">ثالث ثاني لغات</div>
        </div>
        <button class="nav-btn btn-next" style="width:100%; padding:15px;" onclick="startExam()">دخول <i class="fas fa-play"></i></button>
    </div>

    <div id="exam-scene" class="scene">
        <div class="header">
            <div id="info-display" style="font-size:0.8rem; color:#ccc;"></div>
            <div id="totalTimer" class="total-timer">30:00</div>
        </div>
        <div id="exam-content"></div>
        <div class="nav-controls">
            <button class="nav-btn btn-prev" onclick="changeQ(-1)">السابق</button>
            <button class="nav-btn btn-extra" onclick="deferQuestion()">ابقيه للآخر</button>
            <button class="nav-btn btn-next" onclick="nextAction()">التالي</button>
        </div>
        <button id="finalSubmit" class="submit-btn" onclick="confirmFinish()">تسليم الاختبار <i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
// رابط الـ Web App الخاص بك مدمج هنا
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYIY8-tAGnxjzrTiuWzlc05jyZHt2tYlHo2fn9PG4wAOrsQvplkth5LKqU6U6rIgQnFA/exec';

let student = { name: '', class: '' };
let cur = 0; let totalSeconds = 1800;
let examData = []; let userAnswers = {};
let isExamFinished = false;
let cheatCount = 0;

const grammarData = [
    { id:1, q: "Ancient Rome ________ a powerful empire long ago.", o: ["is", "was", "were", "been"], a: "was" },
    { id:2, q: "Gladiators ________ to fight in colosseums.", o: ["use", "used", "using", "uses"], a: "used" },
    { id:3, q: "English ________ by many people nowadays.", o: ["speaks", "is spoken", "is speaking", "spoke"], a: "is spoken" },
    { id:4, q: "The pyramids ________ by the ancient Egyptians.", o: ["built", "were built", "are built", "building"], a: "were built" },
    { id:5, q: "I have ________ finished my test, I'm waiting for the result.", o: ["already", "yet", "never", "ever"], a: "already" },
    { id:6, q: "Have you ________ traveled to Luxor by train?", o: ["already", "yet", "never", "ever"], a: "ever" },
    { id:7, q: "He ________ to play tennis, but now he plays football.", o: ["used to", "use to", "using to", "uses to"], a: "used to" },
    { id:8, q: "The match ________ by millions of people yesterday.", o: ["watched", "was watched", "is watched", "watches"], a: "was watched" },
    { id:9, q: "This is the boy ________ won the gold medal.", o: ["which", "who", "where", "whose"], a: "who" },
    { id:10, q: "The house ________ I was born is in Tanta.", o: ["where", "which", "who", "whose"], a: "where" },
    { id:11, q: "I haven't seen my friend ________ last month.", o: ["for", "since", "ago", "yet"], a: "since" },
    { id:12, q: "They have lived in Riyadh ________ five years.", o: ["since", "for", "ago", "already"], a: "for" },
    { id:13, q: "Did you ________ to have long hair when you were young?", o: ["use", "used", "uses", "using"], a: "use" },
    { id:14, q: "Many books ________ in our school library every year.", o: ["added", "are added", "adding", "adds"], a: "are added" },
    { id:15, q: "The phone ________ he bought is very expensive.", o: ["who", "which", "where", "whose"], a: "which" },
    { id:16, q: "To get the opposite of 'regular', we use ________.", o: ["un-", "ir-", "dis-", "in-"], a: "ir-" },
    { id:17, q: "He showed great ________ by not attacking his rival.", o: ["Strength", "Sportsmanship", "Speed", "Anger"], a: "Sportsmanship" },
    { id:18, q: "Focusing ________ your studies is the key to success.", o: ["on", "at", "in", "with"], a: "on" },
    { id:19, q: "The teacher ________ daughter is a doctor is very kind.", o: ["who", "which", "whose", "whom"], a: "whose" },
    { id:20, q: "The report ________ by the manager two hours ago.", o: ["written", "was written", "writes", "wrote"], a: "was written" }
];
const readingData = [
    { id:21, type: 'read', text: "Sports were essential in ancient civilizations. In Rome, gladiators were professional fighters. Today, we focus on fair play.", q: "Gladiators were ________ fighters in ancient Rome.", o: ["Lazy", "Professional", "Weak", "Slow"], a: "Professional" },
    { id:22, type: 'read', text: "Sports were essential...", q: "Winners in old times received wreaths of ________.", o: ["Gold", "Silver", "Leaves", "Plastic"], a: "Leaves" },
    { id:23, type: 'read', text: "Sports were essential...", q: "Chariot racing was famous in ancient ________.", o: ["Rome", "Egypt", "China", "India"], a: "Rome" },
    { id:24, type: 'read', text: "Sports were essential...", q: "What should a true champion respect?", o: ["Money", "Rival", "Time", "Speed"], a: "Rival" },
    { id:25, type: 'read', text: "Sports were essential...", q: "Modern sports focus on ________ play.", o: ["Bad", "Fair", "Hard", "Fast"], a: "Fair" }
];
const dragMaster = { 
    id: 26, type: 'drag-all', 
    words: ["Horse", "Honor", "Sword", "Focus", "Brave"], 
    a: { z1: "Horse", z2: "Honor", z3: "Sword", z4: "Focus", z5: "Brave" },
    content: `A knight rode a <span class='drop-zone' id='z1' ondrop='drop(event)' ondragover='allow(event)'></span>. He showed <span class='drop-zone' id='z2' ondrop='drop(event)' ondragover='allow(event)'></span> to all. He fought with a <span class='drop-zone' id='z3' ondrop='drop(event)' ondragover='allow(event)'></span>. He had to <span class='drop-zone' id='z4' ondrop='drop(event)' ondragover='allow(event)'></span> on the battle. He was <span class='drop-zone' id='z5' ondrop='drop(event)' ondragover='allow(event)'></span>.`
};

function showScene(id) { document.querySelectorAll('.scene').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function selectClass(el, name) { document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); student.class = name; }
function startExam() { student.name = document.getElementById('studentName').value; if(student.name.length < 8 || !student.class) { alert("أدخل اسمك الرباعي واختر الفصل!"); return; } examData = [...grammarData, ...readingData, dragMaster]; showScene('exam-scene'); document.getElementById('info-display').innerHTML = `${student.name} | ${student.class}`; render(); startMasterTimer(); }
function startMasterTimer() { const timerEl = document.getElementById('totalTimer'); const interval = setInterval(() => { if(isExamFinished) { clearInterval(interval); return; } let mins = Math.floor(totalSeconds / 60); let secs = totalSeconds % 60; timerEl.innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`; if (totalSeconds-- <= 0) { clearInterval(interval); finish(); } }, 1000); }

function render() {
    const q = examData[cur];
    const box = document.getElementById('exam-content');
    let solvedCount = 0;
    examData.forEach(item => { if(item.type === 'drag-all') { if(userAnswers[26] && Object.keys(userAnswers[26]).length === 5) solvedCount++; } else { if(userAnswers[item.id]) solvedCount++; } });
    let h = `<div class="q-card"><p style="color:var(--g); margin-bottom:10px;">Page ${cur+1} of 26 (Solved: ${solvedCount}/26)</p>`;
    if(!q.type) { h += `<div class="q-text">${q.q}</div><div class="options-grid">` + q.o.map(o => `<div class="opt ${userAnswers[q.id] === o ? 'selected' : ''}" onclick="saveAnswer(${q.id}, '${o}')">${o}</div>`).join('') + `</div>`; }
    else if(q.type === 'read') { h += `<div class="passage-box">${q.text}</div><div class="q-text">${q.q}</div><div class="options-grid">` + q.o.map(o => `<div class="opt ${userAnswers[q.id] === o ? 'selected' : ''}" onclick="saveAnswer(${q.id}, '${o}')">${o}</div>`).join('') + `</div>`; }
    else if(q.type === 'drag-all') { h += `<div class="word-bank">` + q.words.map(w => `<div class="word" draggable="true" ondragstart="drag(event)" id="${w}">${w}</div>`).join('') + `</div><div class="drag-container">${q.content}</div>`; }
    box.innerHTML = h + `</div>`;
    if(solvedCount === 26) document.getElementById('finalSubmit').style.display = 'block'; else document.getElementById('finalSubmit').style.display = 'none';
    if(q.type === 'drag-all' && userAnswers[26]) { Object.keys(userAnswers[26]).forEach(zId => { if(document.getElementById(zId)) document.getElementById(zId).innerText = userAnswers[26][zId]; }); }
}

function saveAnswer(qid, val) { userAnswers[qid] = val; render(); }
function nextAction() { const q = examData[cur]; let isSolved = (q.type === 'drag-all') ? (userAnswers[26] && Object.keys(userAnswers[26]).length === 5) : !!userAnswers[q.id]; if(!isSolved) deferQuestion(); else changeQ(1); }
function deferQuestion() { if (examData.length <= 1) return; let deferred = examData.splice(cur, 1)[0]; examData.push(deferred); if (cur >= examData.length) cur = 0; render(); }
function changeQ(dir) { cur += dir; if(cur < 0) cur = 0; if(cur >= examData.length) cur = examData.length - 1; render(); }

function confirmFinish() { if(confirm("هل تريد تسليم الإجابات النهائية لمستر إيهاب؟")) finish(); }

function finish() {
    isExamFinished = true;
    let score = 0; let details = "";
    const source = [...grammarData, ...readingData, dragMaster];
    source.forEach(q => {
        if(q.type === 'drag-all') { Object.keys(q.a).forEach(z => { let ans = (userAnswers[26] ? userAnswers[26][z] : "Empty"); if(ans === q.a[z]) score += 0.5; details += `[Drag-${z}: ${ans}] `; }); } 
        else { let ans = userAnswers[q.id] || "No Answer"; if(ans === q.a) score += 0.5; details += `[Q${q.id}: ${ans}] `; }
    });

    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ name: student.name, className: student.class, score: score.toFixed(1) + " / 15", cheats: cheatCount, details: details })
    });

    document.getElementById('main-box').innerHTML = `
        <div style="text-align:center; padding:20px;">
            <h1 style="color:var(--s)">Done!</h1>
            <p style="font-size:3.5rem; font-weight:900; color:var(--p);">${score.toFixed(1)} / 15</p>
            <p>Name: ${student.name}</p>
            <p>Exit Attempts: ${cheatCount}</p>
        </div>`;
}

function allow(e) { e.preventDefault(); }
function drag(e) { e.dataTransfer.setData("text", e.target.id); }
function drop(e) { e.preventDefault(); let data = e.dataTransfer.getData("text"); e.target.innerText = data; if(!userAnswers[26]) userAnswers[26] = {}; userAnswers[26][e.target.id] = data; render(); }

window.onblur = function() { if(!isExamFinished) { cheatCount++; alert(`Warning: Cheat attempt recorded!`); } };

const canvas = document.getElementById('particles-js'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let pts = Array.from({length:30},()=>({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5}));
function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="rgba(255,255,255,0.1)"; pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>canvas.width)p.vx*=-1; if(p.y<0||p.y>canvas.height)p.vy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(anim); }
anim();
</script>
</body>
</html>
